<!DOCTYPE html>
<html>
<head>
    <title>Client Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top-bar">
        <a href="index.html" class="btn small">Back</a>
    </div>

    <h1>Client Dashboard</h1>

    <div class="card">

        <h2>...Create Ticket...</h2>

        <div class="form">

            <input type="text" id="title" placeholder="Issue title">
            <textarea id="desc" placeholder="Describe your issue"></textarea>
            <label>Priority</label>
            <select id="priority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
            </select>
            <button class="btn primary full" onclick="createTicket()">
                Submit Ticketttttttt
            </button>

            <button class="btn primary full" onclick="logout()">Logout</button>

        </div>

    </div>

    <div class="card">

        <h2>My Tickets</h2>

        <div id="ticketList"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
